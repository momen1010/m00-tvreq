<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moo-Store - Premium  Clothes Store</title>
    <meta name="description" content="Premium clothing store - T-shirts, hoodies, jeans & more. Fast checkout with cart.">
    
    <!-- Three.js CDNs -->

    
    <!-- Font Awesome for social icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1><i class="fas fa-cow"></i> Moo-Store </h1>
            </div>
            <nav class="nav">
                <a href="#home" class="nav-link">Home</a>
                <a href="#products" class="nav-link">Products</a>
                <a href="#cart" class="nav-link" id="cart-link">Cart (<span id="cart-count">0</span>)</a>
            </nav>
        </div>
    </header>

    <!-- Filters Overlay -->
    <div id="filters-overlay" class="filters-overlay">
        <div class="filters">
            <button class="filter-btn active" data-category="all"><i class="fas fa-th-large"></i> All</button>
            <button class="filter-btn" data-category="men"><i class="fas fa-male"></i> Men</button>
            <button class="filter-btn" data-category="women"><i class="fas fa-female"></i> Women</button>
        </div>
    </div>

    <!-- 2D Products Grid -->
    <section id="home" class="products-section">
        <div class="filters-container">
            <div class="filters">
                <button class="filter-btn active" data-category="all"><i class="fas fa-th-large"></i> All</button>
                <button class="filter-btn" data-category="men"><i class="fas fa-male"></i> Men</button>
                <button class="filter-btn" data-category="women"><i class="fas fa-female"></i> Women</button>
            </div>
        </div>
        <div class="products-grid" id="products-grid">
            <!-- Products dynamically loaded here -->
        </div>
    </section>

    <!-- Cart Sidebar (unchanged) -->
    <div id="cart-sidebar" class="cart-sidebar hidden">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button id="close-cart" class="close-btn">&times;</button>
        </div>
        <div class="cart-items" id="cart-items">
            <!-- Cart items dynamically loaded -->
        </div>
        <div class="cart-total">
            <strong>Total: $<span id="cart-total">0.00</span></strong>
        </div>
        <button class="btn btn-primary" id="checkout-btn">Checkout</button>
    </div>

    <!-- Overlay for cart modal -->
    <div id="overlay" class="overlay hidden"></div>

    <!-- Footer with Social & WhatsApp -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="contact-info">
                    <h3>Contact Us</h3>
                    <p>For inquiries & support</p>
                </div>
                <div class="social-links">
                    <a href="https://wa.me/+201556507666?text=Hi%20Moo-Store!" class="whatsapp-btn" target="_blank">
                        <i class="fab fa-whatsapp"></i> WhatsApp +201556507666
                    </a>
                    <div class="social-icons">
                        <a href="www.linkedin.com/in/mòmen-tarek-983242392" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
                        <a href="https://github.com/momen1010" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
                        <a href="https://www.instagram.com/m00_tvrek/?__pwa=1#" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
            </div>
            <p>&copy; 2024 Moo-Store. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
